name: update-jra

on:
  schedule:
    - cron: '20 18 * * *'   # JST 03:20
  workflow_dispatch:

permissions:
  contents: write
  actions: write   # ← これ追加

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate JRA JSON
        run: |
          node scripts/generate-jra-json.js

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/jra/*.json
          git commit -m "update JRA JSON" || echo "No changes"
          git push

      # 👇 ここが今回の本体
      - name: Trigger Pages deploy
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'static.yml',
              ref: 'main'
            });